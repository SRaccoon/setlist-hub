<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D1B69"/>
      <stop offset="100%" style="stop-color:#1A0A3E"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- stars -->
  <circle cx="50" cy="60" r="2" fill="#fff" opacity="0.6"/>
  <circle cx="120" cy="30" r="1.5" fill="#fff" opacity="0.4"/>
  <circle cx="300" cy="50" r="2.5" fill="#fff" opacity="0.5"/>
  <circle cx="350" cy="90" r="1.5" fill="#fff" opacity="0.3"/>
  <circle cx="80" cy="120" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="330" cy="150" r="2" fill="#fff" opacity="0.4"/>
  <circle cx="60" cy="200" r="1.5" fill="#fff" opacity="0.3"/>
  <circle cx="340" cy="250" r="1" fill="#fff" opacity="0.5"/>
  <!-- moon -->
  <circle cx="200" cy="140" r="50" fill="#E8D5F5"/>
  <circle cx="220" cy="125" r="45" fill="url(#bg)"/>
  <!-- cute face on moon -->
  <circle cx="175" cy="135" r="3" fill="#6C3483"/>
  <circle cx="190" cy="135" r="3" fill="#6C3483"/>
  <path d="M172 148 Q182 155 193 148" stroke="#6C3483" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- music notes floating -->
  <g transform="translate(100, 200)" fill="#C39BD3" opacity="0.8">
    <ellipse cx="0" cy="0" rx="8" ry="6" transform="rotate(-20)"/>
    <rect x="6" y="-35" width="3" height="35" rx="1"/>
    <path d="M9 -35 Q20 -45 9 -25" fill="#C39BD3"/>
  </g>
  <g transform="translate(280, 180)" fill="#D7BDE2" opacity="0.7">
    <ellipse cx="0" cy="0" rx="7" ry="5" transform="rotate(-20)"/>
    <rect x="5" y="-30" width="2.5" height="30" rx="1"/>
    <path d="M7.5 -30 Q17 -38 7.5 -20" fill="#D7BDE2"/>
  </g>
  <g transform="translate(150, 280)" fill="#BB8FCE" opacity="0.6">
    <ellipse cx="0" cy="0" rx="6" ry="4.5" transform="rotate(-20)"/>
    <rect x="4" y="-25" width="2" height="25" rx="1"/>
  </g>
  <!-- keyboard at bottom -->
  <g transform="translate(80, 310)">
    <rect x="0" y="0" width="240" height="60" rx="10" fill="#E8D5F5" opacity="0.15"/>
    <rect x="15" y="10" width="22" height="40" rx="3" fill="#fff" opacity="0.2"/>
    <rect x="42" y="10" width="22" height="40" rx="3" fill="#fff" opacity="0.2"/>
    <rect x="69" y="10" width="22" height="40" rx="3" fill="#fff" opacity="0.2"/>
    <rect x="96" y="10" width="22" height="40" rx="3" fill="#fff" opacity="0.2"/>
    <rect x="123" y="10" width="22" height="40" rx="3" fill="#fff" opacity="0.2"/>
    <rect x="150" y="10" width="22" height="40" rx="3" fill="#fff" opacity="0.2"/>
    <rect x="177" y="10" width="22" height="40" rx="3" fill="#fff" opacity="0.2"/>
    <rect x="204" y="10" width="22" height="40" rx="3" fill="#fff" opacity="0.2"/>
    <!-- black keys -->
    <rect x="30" y="10" width="15" height="25" rx="2" fill="#2D1B69" opacity="0.5"/>
    <rect x="57" y="10" width="15" height="25" rx="2" fill="#2D1B69" opacity="0.5"/>
    <rect x="111" y="10" width="15" height="25" rx="2" fill="#2D1B69" opacity="0.5"/>
    <rect x="138" y="10" width="15" height="25" rx="2" fill="#2D1B69" opacity="0.5"/>
    <rect x="165" y="10" width="15" height="25" rx="2" fill="#2D1B69" opacity="0.5"/>
  </g>
</svg>
