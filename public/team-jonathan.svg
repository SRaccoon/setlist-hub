<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A0A00"/>
      <stop offset="100%" style="stop-color:#3D1A00"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- flames background -->
  <g opacity="0.15">
    <ellipse cx="100" cy="380" rx="60" ry="120" fill="#FF6B00"/>
    <ellipse cx="200" cy="360" rx="50" ry="140" fill="#FF8C00"/>
    <ellipse cx="300" cy="380" rx="60" ry="110" fill="#FF6B00"/>
  </g>
  <!-- electric guitar -->
  <g transform="translate(200, 200)">
    <!-- neck -->
    <rect x="-8" y="-160" width="16" height="180" rx="4" fill="#D4A574" opacity="0.9"/>
    <!-- frets -->
    <rect x="-8" y="-140" width="16" height="2" fill="#FFD700" opacity="0.4"/>
    <rect x="-8" y="-115" width="16" height="2" fill="#FFD700" opacity="0.4"/>
    <rect x="-8" y="-93" width="16" height="2" fill="#FFD700" opacity="0.4"/>
    <rect x="-8" y="-73" width="16" height="2" fill="#FFD700" opacity="0.4"/>
    <rect x="-8" y="-55" width="16" height="2" fill="#FFD700" opacity="0.4"/>
    <!-- headstock -->
    <rect x="-14" y="-175" width="28" height="20" rx="6" fill="#8B4513"/>
    <!-- tuning pegs -->
    <circle cx="-10" cy="-170" r="3" fill="#FFD700" opacity="0.6"/>
    <circle cx="10" cy="-170" r="3" fill="#FFD700" opacity="0.6"/>
    <circle cx="-10" cy="-160" r="3" fill="#FFD700" opacity="0.6"/>
    <circle cx="10" cy="-160" r="3" fill="#FFD700" opacity="0.6"/>
    <!-- body -->
    <ellipse cx="0" cy="50" rx="60" ry="70" fill="#E67E22"/>
    <ellipse cx="0" cy="35" rx="55" ry="55" fill="#F39C12"/>
    <!-- cutaway -->
    <circle cx="35" cy="5" r="25" fill="url(#bg)"/>
    <!-- pickups -->
    <rect x="-20" y="25" width="40" height="8" rx="4" fill="#333"/>
    <rect x="-20" y="45" width="40" height="8" rx="4" fill="#333"/>
    <!-- sound hole / cute face -->
    <circle cx="-10" cy="60" r="4" fill="#1A0A00"/>
    <circle cx="10" cy="60" r="4" fill="#1A0A00"/>
    <path d="M-8 72 Q0 80 8 72" stroke="#1A0A00" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- bridge -->
    <rect x="-15" y="85" width="30" height="5" rx="2" fill="#8B4513"/>
  </g>
  <!-- lightning bolts -->
  <g fill="#FFD700" opacity="0.5">
    <polygon points="70,80 85,130 75,130 90,180 60,120 72,120 55,80"/>
    <polygon points="310,100 325,145 315,145 330,190 300,135 312,135 295,100"/>
  </g>
  <!-- wireless signal waves -->
  <g stroke="#FFD700" fill="none" opacity="0.3" stroke-width="2">
    <path d="M320 50 Q340 40 335 60"/>
    <path d="M325 45 Q350 30 345 65"/>
    <path d="M330 40 Q360 20 355 70"/>
  </g>
</svg>
