<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB"/>
      <stop offset="60%" style="stop-color:#FFE4B5"/>
      <stop offset="100%" style="stop-color:#FFDAB9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#sky)"/>
  <!-- clouds -->
  <g fill="#fff" opacity="0.8">
    <circle cx="80" cy="70" r="20"/>
    <circle cx="100" cy="60" r="25"/>
    <circle cx="125" cy="70" r="20"/>
    <circle cx="300" cy="100" r="18"/>
    <circle cx="320" cy="90" r="22"/>
    <circle cx="340" cy="100" r="16"/>
  </g>
  <!-- sun (gentle, not rising-sun style) -->
  <circle cx="320" cy="50" r="30" fill="#FFD700" opacity="0.6"/>
  <circle cx="320" cy="50" r="22" fill="#FFE47A" opacity="0.8"/>
  <!-- power lines -->
  <g stroke="#555" stroke-width="1.5" opacity="0.4">
    <line x1="0" y1="160" x2="400" y2="155"/>
    <line x1="0" y1="170" x2="400" y2="165"/>
  </g>
  <!-- utility pole -->
  <rect x="355" y="120" width="5" height="280" fill="#8B7355" opacity="0.5"/>
  <rect x="340" y="148" width="35" height="3" fill="#8B7355" opacity="0.5"/>
  <!-- road / ground -->
  <rect x="0" y="300" width="400" height="100" fill="#90B077"/>
  <rect x="0" y="300" width="400" height="8" fill="#7A9A65"/>
  <!-- path -->
  <path d="M160 400 Q180 350 200 310 Q220 350 240 400" fill="#D4C5A9" opacity="0.6"/>
  <!-- school / building in background -->
  <g opacity="0.4">
    <rect x="30" y="220" width="120" height="80" rx="2" fill="#E8DCC8"/>
    <rect x="40" y="240" width="20" height="25" rx="2" fill="#B8D4E3"/>
    <rect x="70" y="240" width="20" height="25" rx="2" fill="#B8D4E3"/>
    <rect x="100" y="240" width="20" height="25" rx="2" fill="#B8D4E3"/>
    <rect x="40" y="275" width="20" height="25" rx="2" fill="#B8D4E3"/>
    <rect x="70" y="275" width="20" height="25" rx="2" fill="#B8D4E3"/>
    <rect x="100" y="275" width="20" height="25" rx="2" fill="#B8D4E3"/>
    <rect x="75" y="210" width="30" height="15" fill="#E8DCC8"/>
    <polygon points="60,220 90,205 120,220" fill="#CC8866" opacity="0.6"/>
  </g>
  <!-- bicycle -->
  <g transform="translate(280, 315)" opacity="0.7">
    <circle cx="0" cy="0" r="14" fill="none" stroke="#555" stroke-width="2"/>
    <circle cx="30" cy="0" r="14" fill="none" stroke="#555" stroke-width="2"/>
    <line x1="0" y1="0" x2="15" y2="-15" stroke="#555" stroke-width="2"/>
    <line x1="15" y1="-15" x2="30" y2="0" stroke="#555" stroke-width="2"/>
    <line x1="15" y1="-15" x2="10" y2="-15" stroke="#555" stroke-width="2"/>
    <rect x="8" y="-18" width="8" height="2" rx="1" fill="#555"/>
  </g>
  <!-- cherry blossom petals falling -->
  <g fill="#FFB7C5" opacity="0.7">
    <ellipse cx="60" cy="130" rx="5" ry="3" transform="rotate(30, 60, 130)"/>
    <ellipse cx="140" cy="180" rx="4" ry="2.5" transform="rotate(-20, 140, 180)"/>
    <ellipse cx="230" cy="120" rx="5" ry="3" transform="rotate(45, 230, 120)"/>
    <ellipse cx="180" cy="250" rx="4" ry="2.5" transform="rotate(15, 180, 250)"/>
    <ellipse cx="310" cy="200" rx="5" ry="3" transform="rotate(-35, 310, 200)"/>
    <ellipse cx="100" cy="280" rx="4" ry="2.5" transform="rotate(50, 100, 280)"/>
    <ellipse cx="350" cy="160" rx="3" ry="2" transform="rotate(25, 350, 160)"/>
    <ellipse cx="50" cy="220" rx="3" ry="2" transform="rotate(-15, 50, 220)"/>
    <ellipse cx="260" cy="270" rx="4" ry="2.5" transform="rotate(40, 260, 270)"/>
  </g>
  <!-- headphones on the ground -->
  <g transform="translate(190, 340)" opacity="0.6">
    <path d="M-12 5 Q-12 -10 0 -12 Q12 -10 12 5" fill="none" stroke="#333" stroke-width="3"/>
    <rect x="-15" y="2" width="8" height="12" rx="3" fill="#333"/>
    <rect x="7" y="2" width="8" height="12" rx="3" fill="#333"/>
  </g>
  <!-- birds in the sky -->
  <g stroke="#555" stroke-width="1.5" fill="none" opacity="0.4">
    <path d="M200 40 Q205 35 210 40 Q215 35 220 40"/>
    <path d="M240 55 Q244 51 248 55 Q252 51 256 55"/>
    <path d="M170 60 Q174 56 178 60 Q182 56 186 60"/>
  </g>
</svg>
